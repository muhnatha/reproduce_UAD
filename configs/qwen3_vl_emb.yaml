dataset_bg_dir: dataset/bg/bg_imgs_bvs_full
model:
  in_channels: 1024     # DINO ViT-L features
  filters: [256, 64, 1]
  kernel_sizes: [3, 3, 1]
  strides: [1, 1, 1]
  norm: null
  activation: "lrelu"
  lang_emb_dim: 1024   # Match BGE-M3 dimension
  film_mode: "zero"

text_embedding: "embeddings_qwen3_vl"
dino_model_type: "dinov2_vitl14"

optim:
  lr: 0.001
  weight_decay: 0.0
  step_size: 10
  gamma: 0.75

trainer:
  batch_size: 32
  num_epochs: 30
  save_every: 5
  val_every: 5
  random_pad: true
  val_split: 0.1

criterion: "BCE"
torch_home: None
